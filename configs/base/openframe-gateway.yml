server:
  port: 8100

# Gateway service common configuration
spring:
  main:
    web-application-type: reactive
  session:
    timeout: 7d
  redis:
    enabled: true
    timeout: 2000
    connect-timeout: 2000
    lettuce:
      shutdown-timeout: 2000ms
      pool:
        enabled: true
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms
    client-type: lettuce
  data:
    redis:
      host: redis-master.datasources.svc.cluster.local
      port: 6379
    cassandra:
      enabled: true
    mongodb:
      enabled: true
  cloud:
    config:
      fail-fast: false
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost"
              - "https://localhost"
              - "http://localhost:*"
              - "https://localhost:*"
              - "http://${TENANT_HOST_URL:openframe.ai}"
              - "https://${TENANT_HOST_URL:openframe.ai}"
              - "https://*.${TENANT_HOST_URL:openframe.ai}"
            allowed-methods: "*"
            allowed-headers: "*"
            exposed-headers:
              - Authorization
              - Content-Type
              - Access-Token
              - Refresh-Token
            allow-credentials: true
            max-age: 3600
      httpclient:
        # The reason of the fix is that gateway close SSE connections in 30 sec by default
        # TODO: find better solution how to handle it. It should be possible to configure for only SSE routings.
        response-timeout: 5m
        ssl:
          useInsecureTrustManager: true
        websocket:
          max-frame-payload-length: 1048576 #1MB
        pool:
          max-idle-time: 3000ms  # Evict connections idle >3s — below Node.js default 5s keepAliveTimeout
      routes:
        - id: sas
          uri: http://openframe-authorization-server.microservices.svc.cluster.local:9005
          predicates:
            - Path=/sas/**
          order: 0

        # Direct Swagger/OpenAPI routes (for Swagger UI JavaScript requests)
        - id: swagger-api-docs
          uri: http://openframe-external-api.microservices.svc.cluster.local:8092
          predicates:
            - Path=/api-docs/**
          order: 0

        - id: swagger-ui-direct
          uri: http://openframe-external-api.microservices.svc.cluster.local:8092
          predicates:
            - Path=/swagger-ui/**
          order: 0

        - id: swagger-webjars
          uri: http://openframe-external-api.microservices.svc.cluster.local:8092
          predicates:
            - Path=/webjars/**
          order: 0

        - id: openframe-external-api
          uri: http://openframe-external-api.microservices.svc.cluster.local:8092
          predicates:
            - Path=/external-api/**
          filters:
            - StripPrefix=1

        - id: openframe-api
          uri: http://openframe-api.microservices.svc.cluster.local:8090
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

        - id: openframe-client
          uri: http://openframe-client.microservices.svc.cluster.local:8097
          predicates:
            - Path=/clients/**
          filters:
            - StripPrefix=1

        - id: openframe-ui-spa
          uri: http://openframe-frontend.microservices.svc.cluster.local:3000
          predicates:
            - Path=/**

nats-ws-url: ws://nats.datasources.svc.cluster.local:8080

# Rate limiting configuration
openframe:
  tools:
    tactical-rmm:
      backend:
        url: http://tactical-backend.integrated-tools.svc.cluster.local
        port: "8080"
      websocket:
        url: ws://tactical-backend.integrated-tools.svc.cluster.local
        port: "8383"
        path-prefix: /ws/
      nats:
        url: ws://tactical-nats.integrated-tools.svc.cluster.local
        port: "9235"
        path-prefix: /natsws
  device:
    aspect:
      enabled: false
  rate-limit:
    enabled: true
    default-requests-per-minute: 5
    default-requests-per-hour: 1000
    default-requests-per-day: 10000
    redis-ttl: 7200        # 2 hours in seconds
    fail-open: true
    log-violations: true
    include-headers: true

# OpenFrame Gateway OAuth2 Configuration
  auth:
    error-url: "${TENANT_HOST_URL:https://localhost}/auth/error"
    server:
      url: http://openframe-authorization-server.microservices.svc.cluster.local:9005/sas
      authorize-url: ${TENANT_HOST_URL:https://localhost}/sas
  security:
    cookie:
      domain: null
      secure: true   # true for HTTPS, false for HTTP
    jwt:
      allowed-issuer-base: http://openframe-authorization-server.microservices.svc.cluster.local:9005/sas
      cache:
        expire-after: PT30M
        refresh-after: PT10M
        maximum-size: 2
  gateway:
    oauth:
      client-id: ${OPENFRAME_AUTH_CLIENT_ID:openframe-gateway}
      client-secret: ${OPENFRAME_AUTH_SECRET:openframe-gateway-secret}
      redirect-uri: ${TENANT_HOST_URL:https://localhost}/oauth/callback
      enable: true
  # API Key Statistics configuration
  api-key-stats:
    redis-ttl: 604800      # 7 days in seconds

security:
  oauth2:
    token:
      access:
        expiration-seconds: 3600
      refresh:
        expiration-seconds: 604800

