  """Owner user ID"""
  ownerId: String

  """HubSpot contact ID"""
  hubspotContactId: String

  """HubSpot tenant record ID"""
  hubspotTenantId: String

  """Stripe customer ID"""
  stripeCustomerId: String

  """Whether the tenant is a test account"""
  isTest: Boolean!

  """
  Timestamp when the tenant was created (ISO-8601 local datetime, no timezone)
  """
  createdAt: String

  """
  Timestamp when the tenant was last updated (ISO-8601 local datetime, no timezone)
  """
  updatedAt: String
}

