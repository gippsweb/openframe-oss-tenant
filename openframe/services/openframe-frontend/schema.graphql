"""
Recoverable, user-facing error returned in a mutation payload (vs system errors that surface via onError).
"""
type UserError {
  """Stable machine-readable code (e.g. QUANTITY_DOWNGRADE_NOT_ALLOWED)."""
  code: String!

  """Human-readable description; UI may localize by code."""
  message: String!

  """Optional input field this error refers to (e.g. "quantity")."""
  field: String
}

