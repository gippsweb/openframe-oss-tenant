apiVersion: apps/v1
kind: Deployment
metadata:
  name: openframe-management
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: openframe-management
  template:
    metadata:
      labels:
        app: openframe-management
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        prometheus.io/port: "8096"
        prometheus.io/path: "/management/{{ default .Values.global.image.tag .Values.image.tag }}/prometheus"

    spec:
      initContainers:
        - name: wait-for-config-server
          image: "{{ .Values.initImage.registry }}/{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          command: ["sh", "-c", "until curl -f http://openframe-config.microservices.svc.cluster.local:8888/xml/shared-logback-spring.xml; do sleep 1; done"]

      containers:
        - name: openframe-management
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          ports:
            - containerPort: 8095
              name: http
            - containerPort: 8096
              name: management

          envFrom:
            - configMapRef:
                name: microservices
          env:
            - name: RELEASE_VERSION
              value: "{{ default .Values.global.image.tag .Values.image.tag }}"
            - name: SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING
              value: "true"
            - name: SPRING_DATA_MONGODB_ENABLED
              value: "true"
            - name: SPRING_DATA_CASSANDRA_ENABLED
              value: "false"
            - name: OPENFRAME_API_KEY_STATS_ENABLED
              value: "true"
            - name: OPENFRAME_API_KEY_STATS_SYNC_INTERVAL
              value: "300000"
            - name: OPENFRAME_API_KEY_STATS_LOCK_AT_MOST_FOR
              value: "10m"
            - name: OPENFRAME_API_KEY_STATS_LOCK_AT_LEAST_FOR
              value: "1m"
            {{- if .Values.deployment.oss.ingress.ngrok.enabled }}
            - name: TENANT_HOST_URL
              value: {{ printf "https://%s" (required "deployment.oss.ingress.ngrok.url is required when ngrok ingress is enabled" .Values.deployment.oss.ingress.ngrok.url) | quote }}
            {{- else if .Values.deployment.oss.ingress.localhost.enabled }}
            - name: TENANT_HOST_URL
              value: {{ printf "https://%s" (required "deployment.oss.ingress.localhost.url is required when localhost ingress is enabled" .Values.deployment.oss.ingress.localhost.url) | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /management/{{ default .Values.global.image.tag .Values.image.tag }}/health
              port: management
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /management/{{ default .Values.global.image.tag .Values.image.tag }}/health
              port: management
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /management/{{ default .Values.global.image.tag .Values.image.tag }}/health
              port: management
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
