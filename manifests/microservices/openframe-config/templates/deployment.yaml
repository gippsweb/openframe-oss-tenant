
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openframe-config
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: openframe-config
  template:
    metadata:
      labels:
        app: openframe-config
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        prometheus.io/port: "8889"
        prometheus.io/path: "/management/{{ default .Values.global.image.tag .Values.image.tag }}/prometheus"
    spec:
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              find /repo -mindepth 1 -delete 2>/dev/null || true &&
              git clone --depth=1 https://$(GITHUB_ACTOR):$(GITHUB_PASSWORD)@github.com/gippsweb/openframe-oss-tenant /repo &&
              git -C /repo remote remove origin &&
              chmod -R 777 /repo/.git &&
              echo CLONE_DONE
          envFrom:
            - secretRef:
                name: github-credentials
          volumeMounts:
            - name: git-repo
              mountPath: /repo

      containers:
        - name: openframe-config
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          ports:
            - containerPort: 8888
              name: http
            - containerPort: 8889
              name: management

          envFrom:
            - configMapRef:
                name: microservices
            - configMapRef:
                name: openframe-config
          env:
            - name: RELEASE_VERSION
              value: "{{ default .Values.global.image.tag .Values.image.tag }}"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_URI
              value: "file:///repo"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START
              value: "false"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_REFRESH_RATE
              value: "0"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT__LABEL
              value: "main"
            - name: MANAGEMENT_HEALTH_CONFIG_ENABLED
              value: "false"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"

          volumeMounts:
            - name: git-repo
              mountPath: /repo

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            httpGet:
              path: /management/{{ default .Values.global.image.tag .Values.image.tag }}/health/liveness
              port: management
            initialDelaySeconds: 360
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /management/{{ default .Values.global.image.tag .Values.image.tag }}/health/readiness
              port: management
            initialDelaySeconds: 360
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

      volumes:
        - name: git-repo
          emptyDir: {}
