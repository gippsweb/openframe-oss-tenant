global:
  image:
    tag: latest

deployment:
  oss:
    ingress:
      localhost:
        enabled: true   # Enable localhost ingress with nginx
      ngrok:
        enabled: false  # Enable ngrok ingress for external access
        credentials:
          apiKey: ""
          authtoken: ""
    repository:
      baseDir: manifests
      appsDir: apps
      URL: https://github.com/gippsweb/openframe-oss-tenant.git
      branch: main
      autoSync: true

registerJob:
  enabled: true
  image:
    registry: ghcr.io/flamingo-stack/registry
    repository: curlimages/curl
    tag: "8.9.1"

initImage:
  registry: ghcr.io/flamingo-stack/registry
  repository: curlimages/curl
  tag: "8.9.1"

image:
  registry: ghcr.io/flamingo-stack/openframe-oss-tenant
  repository: openframe-gateway
  tag: ""

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

podAnnotations:
  loki.grafana.com/scrape: "true"
  prometheus.io/scrape: "true"

extraEnv:
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_MAXIDLETIME
    value: "3000"
