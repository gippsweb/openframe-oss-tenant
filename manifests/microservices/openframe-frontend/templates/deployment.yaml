apiVersion: apps/v1
kind: Deployment
metadata:
  name: openframe-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: openframe-frontend
  template:
    metadata:
      labels:
        app: openframe-frontend
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:

      containers:
        - name: openframe-frontend
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ default .Values.global.image.tag .Values.image.tag }}"
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_AUTH_CHECK_INTERVAL
              value: "30000"
            - name: NEXT_PUBLIC_TENANT_HOST_URL
              value: "https://support.maximumit.solutions"
            - name: NEXT_PUBLIC_SHARED_HOST_URL
              value: "https://support.maximumit.solutions"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://support.maximumit.solutions"
          envFrom:
            - configMapRef:
                name: microservices

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
