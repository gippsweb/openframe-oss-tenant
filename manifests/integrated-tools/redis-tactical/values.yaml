global:
  image:
    tag: latest

registerJob:
  enabled: true
  image:
    registry: ghcr.io/flamingo-stack/registry
    repository: curlimages/curl
    tag: "8.9.1"

redisConnection:
  host: "redis-tactical-headless.integrated-tools.svc.cluster.local"
  port: "6379"

redis:
  global:
    security:
      allowInsecureImages: true  # bitnamilegacy

  fullnameOverride: redis-tactical

  image:
    registry: ghcr.io/flamingo-stack/registry
    repository: bitnamilegacy/redis
    tag: 7.4.2-debian-12-r2

  architecture: standalone

  auth:
    enabled: false

  commonConfiguration: |-
    maxmemory 300mb
    maxmemory-policy allkeys-lru

  master:
    revisionHistoryLimit: 2
    priorityClassName: redis-tactical
    podSecurityContext:
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    persistence:
      size: "1Gi"
    readinessProbe:
      timeoutSeconds: 5

  metrics:
    enabled: true
    image:
      registry: ghcr.io/flamingo-stack/registry
      repository: bitnamilegacy/redis-exporter
      tag: 1.76.0-debian-12-r0
    podAnnotations:
      loki.grafana.com/scrape: "true"
      prometheus.io/scrape: "true"
      prometheus.io/port: "9121"
      prometheus.io/path: "/metrics"
