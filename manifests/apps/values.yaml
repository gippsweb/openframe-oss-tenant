global:
  image:
    tag: latest

environment: dev

deployment:
  oss:
    ingress:
      localhost:
        enabled: true   # Enable localhost ingress with nginx
      ngrok:
        enabled: false  # Enable ngrok ingress for external access
        credentials:
          apiKey: ""
          authtoken: ""
    repository:
      baseDir: manifests
      appsDir: apps
      URL: https://github.com/gippsweb/openframe-oss-tenant.git
      branch: main
      profile: dev
      autoSync: true


apps:
  namespace-platform:
    enabled: true
    project: default
    namespace: platform
    syncWave: "-1"
  namespace-datasources:
    enabled: true
    project: default
    namespace: datasources
    syncWave: "-1"
  namespace-microservices:
    enabled: true
    project: default
    namespace: microservices
    syncWave: "-1"
  namespace-client-tools:
    enabled: true
    project: default
    namespace: client-tools
    syncWave: "-1"
  namespace-integrated-tools:
    enabled: true
    project: default
    namespace: integrated-tools
    syncWave: "-1"

  ngrok-operator:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
  ingress-nginx:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
  alloy:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
  loki:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
  prometheus:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
    syncOptions:
      ServerSideApply: true
  grafana:
    enabled: true
    project: platform
    namespace: platform
    syncWave: "0"
    syncOptions:
      ServerSideApply: true
      RespectIgnoreDifferences: true

  mongodb:
    enabled: true
    project: datasources
    namespace: datasources
    syncWave: "1"
  debezium-connect:
    enabled: true
    project: datasources
    namespace: datasources
    syncWave: "1"
  pinot:
